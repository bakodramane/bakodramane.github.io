title: "Dramane Bako | AI for Official Statistics"
tagline: "Weekly insights on AI, surveys, censuses, administrative data, and official statistics"
description: "A professional blog by Dramane Bako sharing weekly updates on artificial intelligence, survey and census methodology, administrative data, agricultural statistics, and responsible AI use in official statistics."
url: "https://bakodramane.github.io"
baseurl: ""
theme: minima
author:
  name: "Dramane Bako"
  email:
  url: "https://bakodramane.github.io/about/"

twitter:
  username:
  card: summary_large_image

social:
  name: "Dramane Bako"
  links:
    - "https://www.linkedin.com/in/bakodramane/"
    - "https://www.researchgate.net/profile/Dramane-Bako"

logo: "/assets/img/social-preview.png"
image: "/assets/img/social-preview.png"

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/

header_pages:
  - en.md
  - fr.md
  - about.md

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: "Dramane Bako"
      categories:
        - AI
        - Survey Research
        - Weekly Update
      tags:
        - AI
        - surveys
        - official-statistics
        - administrative-data
      lang: en

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
